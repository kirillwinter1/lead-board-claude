global:
  resolve_timeout: 5m

route:
  receiver: 'telegram'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'http://alertmanager-telegram-bot:9087/alert/-1002555558888'
        send_resolved: true

templates: []
